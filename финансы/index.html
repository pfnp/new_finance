        /* Базовые стили для мгновенного отображения */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
    </style>
</head>

<body>
    <div id="app">
        <!-- Верхний заголовок -->
        <header class="app-header" style="padding-top: env(safe-area-inset-top);">
            <button id="themeToggle" class="header-btn" aria-label="Сменить тему">🌙</button>
            <h1 class="header-title">Финансы</h1>
            <button id="addWalletBtn" class="header-btn" aria-label="Добавить кошелёк">+</button>
        </header>

        <!-- Основной контент -->
        <main class="main-content" id="mainContent">
            <!-- Карточка общего баланса -->
            <div class="total-card glass-3d" id="totalBalanceCard">
                <div class="total-balance-label">Общий баланс</div>
                <div class="total-balance-amount" id="totalBalanceAmount">0 ₽</div>
                <div class="month-summary" id="monthSummary"></div>
            </div>

            <!-- Список кошельков -->
            <div class="wallets-container" id="walletsContainer">
                <div class="empty-state" id="emptyWallets">
                    <div class="empty-icon">💳</div>
                    <div>Нет кошельков</div>
                    <div class="empty-hint">Нажмите +, чтобы добавить</div>
                </div>
            </div>
        </main>

        <!-- Нижняя навигация -->
        <nav class="tab-bar" style="padding-bottom: env(safe-area-inset-bottom);">
            <a href="/index.html" class="tab-item active" data-tab="home">
                <span class="tab-icon">🏠</span>
                <span class="tab-label">Главная</span>
            </a>
            <a href="/analytics.html" class="tab-item" data-tab="analytics">
                <span class="tab-icon">📊</span>
                <span class="tab-label">Аналитика</span>
            </a>
            <a href="/payments.html" class="tab-item" data-tab="payments">
                <span class="tab-icon">💸</span>
                <span class="tab-label">Платежи</span>
            </a>
        </nav>
    </div>

    <!-- Модальные окна будут добавлены динамически через JS -->
    <script src="/app.js"></script>
</body>

</html>
